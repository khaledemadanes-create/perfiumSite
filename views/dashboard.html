<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfium — لوحة الطلبات</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        margin: 40px auto;
        max-width: 1100px;
        padding: 0 16px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
        font-size: 0.9rem;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: right;
        vertical-align: top;
      }
      th {
        background: #f4f4f4;
      }
      .top-links {
        margin-bottom: 12px;
      }
      .btn-delete {
        padding: 6px 10px;
        font-size: 14px;
        cursor: pointer;
        color: #fff;
        background: #b91c1c;
        border: none;
        border-radius: 6px;
      }
      .btn-delete:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .items-cell {
        max-width: 320px;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h1>طلبات العملاء</h1>
    <div class="top-links">
      <a href="/">العودة للمتجر</a>
    </div>
    <button id="refreshButton">تحديث</button>
    <p id="status"></p>

    <table>
      <thead>
        <tr>
          <th>الاسم</th>
          <th>الهاتف</th>
          <th>العنوان</th>
          <th>المنتجات</th>
          <th>الإجمالي</th>
          <th>التاريخ</th>
          <th>إجراءات</th>
        </tr>
      </thead>
      <tbody id="ordersTableBody"></tbody>
    </table>

    <script>
      const tableBody = document.getElementById("ordersTableBody");
      const statusText = document.getElementById("status");
      const refreshButton = document.getElementById("refreshButton");

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text == null ? "" : String(text);
        return div.innerHTML;
      }

      function formatItems(order) {
        if (order.items && order.items.length) {
          return order.items
            .map(
              (i) =>
                `${i.product} ×${i.quantity} (${Number(i.price).toFixed(2)} ج.م/وحدة) = ${(Number(i.price) * Number(i.quantity)).toFixed(2)}`
            )
            .join("\n");
        }
        if (order.product) {
          return `${order.product}\n(طلب قديم: سعر واحد ${Number(order.price || 0).toFixed(2)})`;
        }
        return "—";
      }

      async function deleteOrder(id, rowEl) {
        const btn = rowEl.querySelector(".btn-delete");
        if (!btn || btn.disabled) return;

        if (!confirm("حذف هذا الطلب؟")) return;

        btn.disabled = true;
        statusText.textContent = "جاري الحذف...";
        try {
          const res = await fetch(`/api/orders/${encodeURIComponent(id)}`, {
            method: "DELETE",
          });

          if (!res.ok) {
            throw new Error("Delete failed");
          }

          statusText.textContent = "تم الحذف.";
          await loadOrders();
        } catch (error) {
          statusText.textContent = "خطأ في الحذف.";
          btn.disabled = false;
        }
      }

      async function loadOrders() {
        statusText.textContent = "جاري التحميل...";
        try {
          const res = await fetch("/api/orders");
          if (!res.ok) {
            throw new Error("Failed to load orders");
          }

          const orders = await res.json();
          tableBody.innerHTML = "";

          if (!orders.length) {
            tableBody.innerHTML = `<tr><td colspan="7">لا توجد طلبات.</td></tr>`;
          } else {
            for (const order of orders) {
              const id = order._id;
              const tr = document.createElement("tr");
              tr.innerHTML = `
                <td>${escapeHtml(order.name)}</td>
                <td>${escapeHtml(order.phone)}</td>
                <td>${escapeHtml(order.address || "")}</td>
                <td class="items-cell">${escapeHtml(formatItems(order)).replace(/\n/g, "<br/>")}</td>
                <td>${Number(order.totalPrice).toFixed(2)}</td>
                <td>${new Date(order.createdAt).toLocaleString("ar-EG")}</td>
                <td><button type="button" class="btn-delete" data-id="${id}">حذف</button></td>
              `;
              tableBody.appendChild(tr);

              tr.querySelector(".btn-delete").addEventListener("click", async () => {
                await deleteOrder(id, tr);
              });
            }
          }

          statusText.textContent = `تم تحميل ${orders.length} طلب(ات).`;
        } catch (error) {
          statusText.textContent = "خطأ في تحميل الطلبات.";
        }
      }

      refreshButton.addEventListener("click", loadOrders);
      loadOrders();
    </script>
  </body>
</html>
