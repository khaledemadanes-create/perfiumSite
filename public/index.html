<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PerfiumSite - New Order</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 640px;
        margin: 40px auto;
        padding: 0 16px;
      }
      form {
        display: grid;
        gap: 12px;
      }
      input,
      button {
        padding: 10px;
        font-size: 16px;
      }
      button {
        cursor: pointer;
      }
      .links {
        margin-top: 16px;
      }
      #message {
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Create Order</h1>

    <form id="orderForm">
      <input type="text" id="name" placeholder="Customer name" required />
      <input type="text" id="phone" placeholder="Phone number" required />
      <input type="text" id="product" placeholder="Product name" required />
      <input
        type="number"
        id="price"
        placeholder="Product price"
        min="0"
        step="0.01"
        required
      />
      <input
        type="number"
        id="totalPrice"
        placeholder="Total price"
        min="0"
        step="0.01"
        required
      />
      <button type="submit">Submit Order</button>
    </form>

    <p id="message"></p>
    <div class="links">
      <a href="/dashboard">Go to dashboard</a>
    </div>

    <script>
      const form = document.getElementById("orderForm");
      const message = document.getElementById("message");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "Saving...";

        const payload = {
          name: document.getElementById("name").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          product: document.getElementById("product").value.trim(),
          price: Number(document.getElementById("price").value),
          totalPrice: Number(document.getElementById("totalPrice").value),
        };

        try {
          const res = await fetch("/api/orders", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (!res.ok) {
            throw new Error("Unable to save order.");
          }

          form.reset();
          message.textContent = "Order saved successfully.";
        } catch (error) {
          message.textContent = "Error saving order.";
        }
      });
    </script>
  </body>
</html>
